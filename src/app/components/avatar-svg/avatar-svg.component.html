<svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" class="avatar-svg-root">
  <!-- Body -->
  <ellipse cx="50" cy="108" rx="32" ry="16" fill="#1e1e22"/>
  <!-- Neck -->
  <rect x="43" y="88" width="14" height="12" [attr.fill]="cfg.skin" rx="3"/>
  <!-- Ears -->
  <ellipse cx="20" cy="57" rx="5" ry="7" [attr.fill]="cfg.skin"/>
  <ellipse cx="80" cy="57" rx="5" ry="7" [attr.fill]="cfg.skin"/>
  <!-- Head -->
  <ellipse cx="50" cy="57" rx="28" ry="30" [attr.fill]="cfg.skin"/>
  <!-- Hair styles -->
  @if (cfg.style === 'short') {
    <ellipse cx="50" cy="35" rx="28" ry="16" [attr.fill]="cfg.hair"/>
    <rect x="22" y="36" width="56" height="10" [attr.fill]="cfg.skin"/>
  }
  @if (cfg.style === 'long') {
    <ellipse cx="50" cy="30" rx="28" ry="18" [attr.fill]="cfg.hair"/>
    <rect x="22" y="36" width="56" height="10" [attr.fill]="cfg.skin"/>
    <rect x="22" y="55" width="8" height="30" [attr.fill]="cfg.hair" rx="4"/>
    <rect x="70" y="55" width="8" height="30" [attr.fill]="cfg.hair" rx="4"/>
  }
  @if (cfg.style === 'curly') {
    <ellipse cx="50" cy="28" rx="29" ry="15" [attr.fill]="cfg.hair"/>
    <ellipse cx="27" cy="35" rx="10" ry="8" [attr.fill]="cfg.hair"/>
    <ellipse cx="73" cy="35" rx="10" ry="8" [attr.fill]="cfg.hair"/>
    <ellipse cx="40" cy="27" rx="9" ry="7" [attr.fill]="cfg.hair"/>
    <ellipse cx="60" cy="27" rx="9" ry="7" [attr.fill]="cfg.hair"/>
    <rect x="25" y="36" width="50" height="10" [attr.fill]="cfg.skin"/>
  }
  <!-- Eyebrows (not for bald) -->
  @if (cfg.style !== 'bald') {
    <path d="M33 46 Q39 42 45 46" [attr.stroke]="cfg.hair" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M55 46 Q61 42 67 46" [attr.stroke]="cfg.hair" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  }
  <!-- Eyes -->
  <ellipse cx="39" cy="54" rx="5.5" ry="5" fill="white"/>
  <ellipse cx="61" cy="54" rx="5.5" ry="5" fill="white"/>
  <circle cx="39" cy="55" r="3.2" [attr.fill]="cfg.eyes"/>
  <circle cx="61" cy="55" r="3.2" [attr.fill]="cfg.eyes"/>
  <circle cx="39.8" cy="54.5" r="1.3" fill="#000"/>
  <circle cx="61.8" cy="54.5" r="1.3" fill="#000"/>
  <!-- Nose -->
  <ellipse cx="50" cy="66" rx="3" ry="2" fill="rgba(0,0,0,0.12)"/>
  <!-- Mouth -->
  <path d="M43 74 Q50 80 57 74" stroke="#c47" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  @if (cfg.acc === 'glasses') {
    <circle cx="39" cy="54" r="8" fill="none" stroke="#888" stroke-width="1.8"/>
    <circle cx="61" cy="54" r="8" fill="none" stroke="#888" stroke-width="1.8"/>
    <line x1="47" y1="54" x2="53" y2="54" stroke="#888" stroke-width="1.8"/>
    <line x1="15" y1="54" x2="31" y2="54" stroke="#888" stroke-width="1.5"/>
    <line x1="69" y1="54" x2="85" y2="54" stroke="#888" stroke-width="1.5"/>
  }
</svg>
